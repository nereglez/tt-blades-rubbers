<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TT Equipment Database — Gomas & Maderas</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #f75d5d;
    --accent3: #4fd17a;
    --text: #e8eaf6;
    --text-dim: #7b82a8;
    --star: #f5c518;
    --tag-off: #1e3a5f;
    --tag-all: #1e4a2e;
    --tag-def: #3d2020;
    --tag-off-text: #6ab0f5;
    --tag-all-text: #4fd17a;
    --tag-def-text: #f57070;
    --radius: 10px;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; }
  header h1 span { color: var(--accent); }
  .header-tabs { display: flex; gap: 4px; margin-left: auto; }
  .tab-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  /* LAYOUT */
  .app { display: flex; height: calc(100vh - 57px); }
  .sidebar { width: 260px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
  .main { flex: 1; overflow-y: auto; padding: 20px; }

  /* SIDEBAR */
  .sidebar-section { display: flex; flex-direction: column; gap: 8px; }
  .sidebar-section label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
  input[type=text], select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: var(--radius); font-size: 0.9rem; width: 100%; outline: none; }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  .range-row { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-dim); }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  .range-val { min-width: 24px; text-align: right; color: var(--text); }

  .btn { padding: 8px 14px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a7aee; }
  .btn-danger { background: var(--accent2); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-outline:hover { border-color: var(--accent); color: var(--text); }
  .btn-sm { padding: 4px 10px; font-size: 0.78rem; }
  .btn-compare { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
  .btn-compare.active { background: #1e3a5f; border-color: var(--accent); color: var(--accent); }

  /* COMPARE BAR */
  #compare-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface2); border-top: 2px solid var(--accent); padding: 10px 24px; display: none; align-items: center; gap: 12px; z-index: 200; }
  #compare-bar.visible { display: flex; }
  #compare-bar h3 { font-size: 0.9rem; color: var(--accent); }
  .compare-names { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
  .compare-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
  .compare-chip button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1rem; line-height: 1; }
  .compare-chip button:hover { color: var(--accent2); }

  /* CARDS GRID */
  .results-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .results-count { color: var(--text-dim); font-size: 0.9rem; }
  .sort-select { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: var(--radius); font-size: 0.85rem; outline: none; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: border-color 0.2s, transform 0.15s; position: relative; }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card.in-compare { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,142,247,0.3); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-brand { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
  .card-name { font-size: 1rem; font-weight: 700; margin: 2px 0 6px; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .tag-off { background: var(--tag-off); color: var(--tag-off-text); }
  .tag-all { background: var(--tag-all); color: var(--tag-all-text); }
  .tag-def { background: var(--tag-def); color: var(--tag-def-text); }
  .tag-mat { background: #2a2040; color: #b39ddb; }
  .tag-cat { background: #1a2a1a; color: #80cbc4; }

  .stat-bars { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .stat-row { display: flex; align-items: center; gap: 8px; }
  .stat-label { font-size: 0.7rem; color: var(--text-dim); width: 60px; flex-shrink: 0; }
  .stat-bar-bg { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .fill-speed { background: linear-gradient(90deg, #4f8ef7, #a78bfa); }
  .fill-spin { background: linear-gradient(90deg, #4fd17a, #34d399); }
  .fill-control { background: linear-gradient(90deg, #f5c518, #fbbf24); }
  .stat-num { font-size: 0.75rem; color: var(--text); width: 28px; text-align: right; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 2px; }
  .card-price { font-size: 0.85rem; color: var(--accent3); font-weight: 600; }
  .card-hardness { font-size: 0.78rem; color: var(--text-dim); }
  .card-rating { display: flex; gap: 2px; }
  .star { color: var(--star); font-size: 0.9rem; }
  .star.empty { color: var(--border); }
  .card-actions { display: flex; gap: 6px; margin-top: 10px; }
  .card-note-preview { font-size: 0.75rem; color: var(--text-dim); margin-top: 6px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 28px; box-shadow: var(--shadow); }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .modal-title-area .modal-brand { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
  .modal-title-area h2 { font-size: 1.4rem; font-weight: 800; margin: 4px 0; }
  .modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-close:hover { border-color: var(--accent2); color: var(--accent2); }

  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 20px; }
  .spec-section h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 12px; }
  .spec-table { display: flex; flex-direction: column; gap: 8px; }
  .spec-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: var(--surface2); border-radius: 6px; }
  .spec-key { font-size: 0.8rem; color: var(--text-dim); }
  .spec-val { font-size: 0.85rem; font-weight: 600; }

  .stat-bars-big { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .stat-row-big { display: flex; align-items: center; gap: 10px; }
  .stat-label-big { font-size: 0.8rem; color: var(--text-dim); width: 70px; }
  .stat-bar-bg-big { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .stat-bar-fill-big { height: 100%; border-radius: 4px; }
  .stat-num-big { font-size: 0.85rem; font-weight: 700; width: 36px; text-align: right; }

  .rating-section { margin-bottom: 20px; }
  .rating-section h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 10px; }
  .stars-input { display: flex; gap: 6px; margin-bottom: 12px; }
  .star-btn { background: none; border: none; font-size: 1.6rem; cursor: pointer; transition: transform 0.1s; }
  .star-btn:hover { transform: scale(1.2); }
  textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: var(--radius); font-size: 0.9rem; width: 100%; height: 90px; resize: vertical; outline: none; font-family: inherit; }
  textarea:focus { border-color: var(--accent); }
  .modal-save-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }

  /* COMPARE VIEW */
  #compare-view { display: none; padding: 20px; }
  #compare-view.active { display: block; }
  .compare-table-wrap { overflow-x: auto; }
  .compare-table { border-collapse: collapse; width: 100%; background: var(--surface); border-radius: var(--radius); overflow: hidden; }
  .compare-table th, .compare-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .compare-table th { background: var(--surface2); color: var(--text-dim); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .compare-table td:first-child { color: var(--text-dim); font-size: 0.78rem; }
  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table .prod-name-col { font-weight: 700; color: var(--text); }
  .compare-bar-cell { display: flex; align-items: center; gap: 8px; }
  .compare-bar-cell .bar { height: 6px; background: var(--accent); border-radius: 3px; }
  .best-val { color: var(--accent3); font-weight: 700; }

  /* NO RESULTS */
  .no-results { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .no-results span { font-size: 3rem; display: block; margin-bottom: 12px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  @media (max-width: 700px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; max-height: 300px; }
    .modal-grid { grid-template-columns: 1fr; }
  }

  /* SETUPS */
  #setups-view { display: none; flex: 1; overflow-y: auto; padding: 20px; }
  #setups-view.active { display: block; }
  .setup-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: border-color 0.2s; }
  .setup-card:hover { border-color: var(--accent); }
  .setup-card-title { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
  .setup-card-date { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 12px; }
  .setup-parts { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .setup-part { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
  .setup-part-label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; width: 72px; flex-shrink: 0; }
  .setup-part-val { font-weight: 600; }
  .setup-part-badge { font-size: 0.68rem; padding: 1px 7px; border-radius: 8px; font-weight: 600; }
  .badge-red { background: #3d1a1a; color: #f87171; }
  .badge-black { background: #1a1a1a; color: #94a3b8; border: 1px solid #333; }
  .setup-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 10px; }
  .setup-actions { display: flex; gap: 6px; }
  .setup-note-preview { font-size: 0.75rem; color: var(--text-dim); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; margin-top: 6px; }
  .setup-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
  .form-group select, .form-group input[type=text] { width: 100%; }
  .form-group datalist { display: none; }
  @media (max-width: 700px) { .setup-modal-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <h1>TT <span>Equipment</span> DB</h1>
  <div class="header-tabs">
    <button class="tab-btn active" id="tab-rubbers" onclick="switchTab('rubbers')">Gomas</button>
    <button class="tab-btn" id="tab-blades" onclick="switchTab('blades')">Maderas</button>
    <button class="tab-btn" id="tab-compare" onclick="switchTab('compare')">Comparar (<span id="compare-count">0</span>)</button>
    <button class="tab-btn" id="tab-setups" onclick="switchTab('setups')">Mis setups</button>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <label>Buscar</label>
      <input type="text" id="search" placeholder="Nombre, marca…" oninput="applyFilters()">
    </div>
    <div class="sidebar-section" id="rubber-filters">
      <label>Tipo</label>
      <select id="filter-type" onchange="applyFilters()">
        <option value="">Todos</option>
        <option value="Ofensiva">Ofensiva</option>
        <option value="All-round">All-round</option>
        <option value="Defensiva">Defensiva</option>
      </select>
      <label>Categoría</label>
      <select id="filter-cat" onchange="applyFilters()">
        <option value="">Todas</option>
        <option value="Tensor">Tensor (ESN)</option>
        <option value="China">China (tack)</option>
        <option value="Híbrida">Híbrida</option>
        <option value="Pips-out">Pips-out</option>
        <option value="Anti">Anti</option>
      </select>
      <label>Marca</label>
      <select id="filter-brand" onchange="applyFilters()">
        <option value="">Todas</option>
      </select>
      <label>Velocidad mínima</label>
      <div class="range-row">
        <input type="range" id="filter-speed" min="0" max="100" value="0" oninput="document.getElementById('spd-val').textContent=this.value;applyFilters()">
        <span class="range-val" id="spd-val">0</span>
      </div>
      <label>Dureza máx. (°ESN normalizado)</label>
      <div class="range-row">
        <input type="range" id="filter-hard" min="38" max="65" value="65" oninput="document.getElementById('hrd-val').textContent=this.value;applyFilters()">
        <span class="range-val" id="hrd-val">65</span>
      </div>
      <label>Nivel recomendado</label>
      <select id="filter-nivel" onchange="applyFilters()">
        <option value="">Todos</option>
        <option value="Principiante">Principiante</option>
        <option value="Intermedio">Intermedio</option>
        <option value="Avanzado">Avanzado</option>
        <option value="Profesional">Profesional</option>
      </select>
    </div>
    <div class="sidebar-section" id="blade-filters" style="display:none">
      <label>Categoría</label>
      <select id="filter-blade-cat" onchange="applyFilters()">
        <option value="">Todas</option>
        <option value="OFF+">OFF+</option>
        <option value="OFF">OFF</option>
        <option value="OFF-">OFF-</option>
        <option value="ALL+">ALL+</option>
        <option value="ALL">ALL</option>
        <option value="DEF">DEF</option>
      </select>
      <label>Marca</label>
      <select id="filter-blade-brand" onchange="applyFilters()">
        <option value="">Todas</option>
      </select>
      <label>Material</label>
      <select id="filter-material" onchange="applyFilters()">
        <option value="">Todos</option>
        <option value="Madera pura">Madera pura</option>
        <option value="Carbon">Carbon</option>
        <option value="ALC">ALC (Arylate-Carbon)</option>
        <option value="ZLC">ZLC (Zylon-Carbon)</option>
        <option value="Hinoki">Hinoki</option>
        <option value="Fibra de vidrio">Fibra de vidrio</option>
        <option value="Hinoki">Hinoki puro</option>
      </select>
      <label>Velocidad mínima</label>
      <div class="range-row">
        <input type="range" id="filter-blade-speed" min="0" max="100" value="0" oninput="document.getElementById('bspd-val').textContent=this.value;applyFilters()">
        <span class="range-val" id="bspd-val">0</span>
      </div>
      <label>Nivel recomendado</label>
      <select id="filter-blade-nivel" onchange="applyFilters()">
        <option value="">Todos</option>
        <option value="Principiante">Principiante</option>
        <option value="Intermedio">Intermedio</option>
        <option value="Avanzado">Avanzado</option>
        <option value="Profesional">Profesional</option>
      </select>
    </div>
    <div class="sidebar-section">
      <button class="btn btn-outline btn-sm" onclick="resetFilters()">Limpiar filtros</button>
    </div>
    <div class="sidebar-section" style="margin-top:auto;">
      <label style="color:var(--accent3)">⭐ Solo mis puntuadas</label>
      <button class="btn btn-outline btn-sm" onclick="toggleRated()" id="rated-btn">Mostrar todas</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="main-view">
    <div class="results-header">
      <span class="results-count" id="results-count"></span>
      <select class="sort-select" id="sort-select" onchange="applyFilters()">
        <option value="name">Ordenar: Nombre</option>
        <option value="speed-desc">Velocidad ↓</option>
        <option value="spin-desc">Spin ↓</option>
        <option value="control-desc">Control ↓</option>
        <option value="rating-desc">Mi puntuación ↓</option>
        <option value="price-asc">Precio ↑</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
  </main>

  <!-- COMPARE VIEW -->
  <div id="compare-view">
    <h2 style="margin-bottom:20px;font-size:1.2rem">Comparativa</h2>
    <div class="compare-table-wrap" id="compare-table-wrap"></div>
    <p id="compare-hint" style="color:var(--text-dim);margin-top:40px;text-align:center;display:none">Selecciona equipamiento con el botón ⊕ en las tarjetas para comparar aquí.</p>
  </div>

  <!-- SETUPS VIEW -->
  <div id="setups-view">
    <div class="setup-header">
      <h2 style="font-size:1.2rem">Mis Setups</h2>
      <button class="btn btn-primary btn-sm" onclick="openSetupModal(null)">+ Nuevo setup</button>
    </div>
    <div class="grid" id="setups-grid"></div>
    <div id="setups-empty" style="text-align:center;padding:60px 20px;color:var(--text-dim);display:none">
      <span style="font-size:3rem;display:block;margin-bottom:12px">🏓</span>
      <p>Aún no tienes setups guardados.</p>
      <button class="btn btn-primary" style="margin-top:16px" onclick="openSetupModal(null)">Añadir mi primer setup</button>
    </div>
  </div>
</div>

<!-- COMPARE BAR -->
<div id="compare-bar">
  <h3>Comparando:</h3>
  <div class="compare-names" id="compare-chips"></div>
  <button class="btn btn-primary btn-sm" onclick="switchTab('compare')">Ver comparativa</button>
  <button class="btn btn-outline btn-sm" onclick="clearCompare()">Limpiar</button>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-content"></div>
</div>

<!-- SETUP MODAL -->
<div class="modal-overlay" id="setup-modal" onclick="closeSetupModalOutside(event)">
  <div class="modal" style="max-width:680px" id="setup-modal-content"></div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
const RUBBERS = [
  // ── BUTTERFLY ──────────────────────────────────────────────────────────────
  // Dureza en escala japonesa (°J). Tenergy: 36°J ≈ 47°ESN. Dignics: 40°J ≈ 50°ESN, 44°J ≈ 54°ESN
  {id:'r001', brand:'Butterfly', name:'Tenergy 05', type:'Ofensiva', cat:'Tensor', nivel:'Avanzado', speed:92, spin:91, control:57, hardness:36, hardScale:'°J (≈47°ESN)', thickness:['1.7','1.9','2.1','Max'], price:65, color:'red/black', note:'Estándar no-tácky de la industria durante 15 años. Esponja Spring Sponge original. Muy popular en EHF/WTT.'},
  {id:'r002', brand:'Butterfly', name:'Tenergy 05 Hard', type:'Ofensiva', cat:'Tensor', nivel:'Avanzado', speed:93, spin:91, control:52, hardness:41, hardScale:'°J (≈51°ESN)', thickness:['1.9','2.1','Max'], price:65, color:'red/black', note:'Versión más dura del T05. Trayectoria más plana, más directa. Requiere técnica consolidada.'},

// ─── STATE ─────────────────────────────────────────────────────────────────────
let currentTab = 'rubbers';
let compareList = [];
let userRatings = JSON.parse(localStorage.getItem('tt_ratings') || '{}');
let userNotes = JSON.parse(localStorage.getItem('tt_notes') || '{}');
let showOnlyRated = false;
let tempRating = 0;
let setupsList = JSON.parse(localStorage.getItem('tt_setups') || '[]');
let editingSetupId = null;
let tempSetupRating = 0;

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  populateBrandFilters();
  applyFilters();
}

function populateBrandFilters() {
  const rubberBrands = [...new Set(RUBBERS.map(r => r.brand))].sort();
  const bladeBrands = [...new Set(BLADES.map(b => b.brand))].sort();
  const rSel = document.getElementById('filter-brand');
  const bSel = document.getElementById('filter-blade-brand');
  rubberBrands.forEach(b => { rSel.innerHTML += `<option>${b}</option>`; });
  bladeBrands.forEach(b => { bSel.innerHTML += `<option>${b}</option>`; });
}

// ─── TAB ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ['rubbers','blades','compare','setups'].forEach(t => {
    const btn = document.getElementById('tab-'+t);
    if (btn) btn.classList.toggle('active', t === tab);
  });
  const isSetups = tab === 'setups';
  const isCompare = tab === 'compare';
  document.getElementById('main-view').style.display = (!isSetups && !isCompare) ? 'block' : 'none';
  document.getElementById('compare-view').style.display = isCompare ? 'block' : 'none';
  document.getElementById('setups-view').style.display = isSetups ? 'block' : 'none';
  // Sidebar: hide entirely on setups tab
  document.querySelector('.sidebar').style.display = isSetups ? 'none' : 'flex';
  document.getElementById('rubber-filters').style.display = tab === 'rubbers' ? 'flex' : 'none';
  document.getElementById('blade-filters').style.display = tab === 'blades' ? 'flex' : 'none';
  if (isCompare) renderCompare();
  else if (isSetups) renderSetups();
  else applyFilters();
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function applyFilters() {
  if (currentTab === 'compare' || currentTab === 'setups') return;
  const search = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let items;
  if (currentTab === 'rubbers') {
    const type = document.getElementById('filter-type').value;
    const cat = document.getElementById('filter-cat').value;
    const brand = document.getElementById('filter-brand').value;
    const minSpeed = +document.getElementById('filter-speed').value;
    const maxHard = +document.getElementById('filter-hard').value;
    const nivel = document.getElementById('filter-nivel').value;
    items = RUBBERS.filter(r => {
      if (search && !r.name.toLowerCase().includes(search) && !r.brand.toLowerCase().includes(search)) return false;
      if (type && r.type !== type) return false;
      if (cat && r.cat !== cat) return false;
      if (brand && r.brand !== brand) return false;
      if (r.speed < minSpeed) return false;
      if (toESN(r.hardness, r.hardScale) > maxHard) return false;
      if (nivel && r.nivel !== nivel) return false;
      if (showOnlyRated && !userRatings[r.id]) return false;
      return true;
    });
  } else {
    const cat = document.getElementById('filter-blade-cat').value;
    const brand = document.getElementById('filter-blade-brand').value;
    const mat = document.getElementById('filter-material').value;
    const minSpeed = +document.getElementById('filter-blade-speed').value;
    const nivelBlade = document.getElementById('filter-blade-nivel').value;
    items = BLADES.filter(b => {
      if (search && !b.name.toLowerCase().includes(search) && !b.brand.toLowerCase().includes(search)) return false;
      if (cat && b.cat !== cat) return false;
      if (brand && b.brand !== brand) return false;
      if (mat && !b.material.includes(mat)) return false;
      if (b.speed < minSpeed) return false;
      if (nivelBlade && b.nivel !== nivelBlade) return false;
      if (showOnlyRated && !userRatings[b.id]) return false;
      return true;
    });
  }

  // Sort
  items = [...items];
  if (sort === 'name') items.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === 'speed-desc') items.sort((a,b) => b.speed - a.speed);
  else if (sort === 'spin-desc') items.sort((a,b) => (b.spin||0) - (a.spin||0));
  else if (sort === 'control-desc') items.sort((a,b) => b.control - a.control);
  else if (sort === 'rating-desc') items.sort((a,b) => (userRatings[b.id]||0) - (userRatings[a.id]||0));
  else if (sort === 'price-asc') items.sort((a,b) => a.price - b.price);

  document.getElementById('results-count').textContent = `${items.length} resultados`;
  renderGrid(items);
}

function resetFilters() {
  document.getElementById('search').value = '';
  ['filter-type','filter-cat','filter-brand','filter-blade-cat','filter-blade-brand','filter-material','filter-nivel','filter-blade-nivel'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('filter-speed').value = 0; document.getElementById('spd-val').textContent = '0';
  document.getElementById('filter-hard').value = 65; document.getElementById('hrd-val').textContent = '65';
  document.getElementById('filter-blade-speed').value = 0; document.getElementById('bspd-val').textContent = '0';
  applyFilters();
}

function toggleRated() {
  showOnlyRated = !showOnlyRated;
  document.getElementById('rated-btn').textContent = showOnlyRated ? 'Mostrar todas' : 'Mostrar todas';
  document.getElementById('rated-btn').style.borderColor = showOnlyRated ? 'var(--star)' : '';
  applyFilters();
}

// ─── RENDER GRID ──────────────────────────────────────────────────────────────
function renderGrid(items) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML = '<div class="no-results"><span>🏓</span>Sin resultados con estos filtros</div>';
    return;
  }
  items.forEach(item => {
    const inCompare = compareList.includes(item.id);
    const rating = userRatings[item.id] || 0;
    const note = userNotes[item.id] || '';
    const isRubber = currentTab === 'rubbers';
    grid.innerHTML += `
    <div class="card ${inCompare?'in-compare':''}" id="card-${item.id}" onclick="openModal('${item.id}')">
      <div class="card-top">
        <div>
          <div class="card-brand">${item.brand}</div>
          <div class="card-name">${item.name}</div>
        </div>
        <button class="btn btn-compare btn-sm ${inCompare?'active':''}" onclick="toggleCompare(event,'${item.id}')">⊕</button>
      </div>
      <div class="card-tags">
        ${isRubber ? `<span class="tag ${typeTag(item.type)}">${item.type}</span><span class="tag tag-cat">${item.cat}</span>` : `<span class="tag tag-off">${item.cat}</span><span class="tag tag-mat">${item.material}</span>`}
        ${item.nivel ? `<span class="tag" style="background:#1a1a2e;color:${nivelColor(item.nivel)};border:1px solid ${nivelColor(item.nivel)}40">${item.nivel}</span>` : ''}
      </div>
      <div class="stat-bars">
        <div class="stat-row"><span class="stat-label">Velocidad</span><div class="stat-bar-bg"><div class="stat-bar-fill fill-speed" style="width:${item.speed}%"></div></div><span class="stat-num">${item.speed}</span></div>
        ${isRubber ? `<div class="stat-row"><span class="stat-label">Spin</span><div class="stat-bar-bg"><div class="stat-bar-fill fill-spin" style="width:${item.spin}%"></div></div><span class="stat-num">${item.spin}</span></div>` : ''}
        <div class="stat-row"><span class="stat-label">Control</span><div class="stat-bar-bg"><div class="stat-bar-fill fill-control" style="width:${item.control}%"></div></div><span class="stat-num">${item.control}</span></div>
        ${isRubber ? `<div class="stat-row"><span class="stat-label" style="color:#c084fc">Dureza</span><div class="stat-bar-bg" title="${toESN(item.hardness,item.hardScale)}°ESN normalizado"><div class="stat-bar-fill" style="width:${hardnessPct(item)}%;background:linear-gradient(90deg,#818cf8,#c084fc)"></div></div><span class="stat-num" style="font-size:0.68rem;color:#c084fc">${toESN(item.hardness,item.hardScale)}°</span></div>` : ''}
      </div>
      <div class="card-footer">
        <span class="card-price">~€${item.price}</span>
        ${isRubber ? `<span class="card-hardness" style="font-size:0.72rem">${item.hardness}${item.hardScale.replace(' (≈'+toESN(item.hardness,item.hardScale)+'°ESN)','')}</span>` : `<span class="card-hardness">${item.plies} · ${item.weight}g</span>`}
        <div class="card-rating">${renderStars(rating)}</div>
      </div>
      ${note ? `<div class="card-note-preview">📝 ${note}</div>` : ''}
    </div>`;
  });
}

function typeTag(type) {
  if (type === 'Ofensiva') return 'tag-off';
  if (type === 'Defensiva') return 'tag-def';
  return 'tag-all';
}

function nivelColor(nivel) {
  if (nivel === 'Principiante') return '#4fd17a';
  if (nivel === 'Intermedio') return '#f5c518';
  if (nivel === 'Avanzado') return '#4f8ef7';
  if (nivel === 'Profesional') return '#f75d5d';
  return '#7b82a8';
}

// ─── HARDNESS NORMALISATION ───────────────────────────────────────────────────
// Butterfly (°J) y DHS (°C) usan Shore A; fabricantes europeos (Andro, Tibhar,
// JOOLA, Yasaka, Donic, Stiga, Victas…) usan Shore O (= °ESN).
// Tabla de conversión empírica basada en datos de r/tabletennis, TTGearLab y
// mediciones con durómetro (Shore A → Shore O):
//  35→46  36→47  37→48  38→50  39→52  40→53  41→54  42→55  43→56  44→58
// Fuente de referencia: Wolfram Demonstrations, MyTableTennis forum, TTGearLab.
function toESN(h, scale) {
  if (!scale || scale.includes('ESN')) return h; // ya está en ESN
  // Shore A (°J / °C) → Shore O (°ESN)
  const lut = {33:43,34:44,35:46,36:47,37:48,38:50,39:52,40:53,41:54,42:55,43:56,44:58,45:60};
  return lut[h] ?? (h >= 45 ? h + 15 : h + 11);
}

function hardnessLabel(item) {
  const esn = toESN(item.hardness, item.hardScale);
  const orig = `${item.hardness}${item.hardScale}`;
  if (item.hardScale && !item.hardScale.includes('ESN')) {
    return `${orig} <span style="color:var(--text-dim);font-weight:400">≈ ${esn}°ESN</span>`;
  }
  return orig;
}

function hardnessPct(item) {
  // posición en la barra: escala 38–62°ESN normalizada a 0-100%
  const esn = toESN(item.hardness, item.hardScale);
  return Math.min(100, Math.max(0, Math.round((esn - 38) / (62 - 38) * 100)));
}

function renderStars(n) {
  return [1,2,3,4,5].map(i => `<span class="star ${i<=n?'':'empty'}">${i<=n?'★':'☆'}</span>`).join('');
}

// ─── COMPARE ─────────────────────────────────────────────────────────────────
function toggleCompare(event, id) {
  event.stopPropagation();
  if (compareList.includes(id)) {
    compareList = compareList.filter(x => x !== id);
  } else {
    if (compareList.length >= 4) { alert('Máximo 4 elementos a comparar'); return; }
    compareList.push(id);
  }
  updateCompareBar();
  // Update card highlight
  const card = document.getElementById('card-'+id);
  if (card) {
    card.classList.toggle('in-compare', compareList.includes(id));
    const btn = card.querySelector('.btn-compare');
    if (btn) btn.classList.toggle('active', compareList.includes(id));
  }
}

function updateCompareBar() {
  const bar = document.getElementById('compare-bar');
  const chips = document.getElementById('compare-chips');
  const countEl = document.getElementById('compare-count');
  countEl.textContent = compareList.length;
  bar.classList.toggle('visible', compareList.length > 0);
  const allItems = [...RUBBERS, ...BLADES];
  chips.innerHTML = compareList.map(id => {
    const item = allItems.find(x => x.id === id);
    return `<div class="compare-chip">${item.brand} ${item.name}<button onclick="toggleCompare(event,'${id}')">×</button></div>`;
  }).join('');
}

function clearCompare() {
  compareList = [];
  updateCompareBar();
  applyFilters();
}

function renderCompare() {
  const wrap = document.getElementById('compare-table-wrap');
  const hint = document.getElementById('compare-hint');
  if (!compareList.length) { wrap.innerHTML = ''; hint.style.display = 'block'; return; }
  hint.style.display = 'none';
  const allItems = [...RUBBERS, ...BLADES];
  const items = compareList.map(id => allItems.find(x => x.id === id)).filter(Boolean);
  const isRubbers = items[0].spin !== undefined;

  const keys = isRubbers
    ? [['Marca','brand'],['Categoría','cat'],['Tipo','type'],['Velocidad','speed'],['Spin','spin'],['Control','control'],['Dureza','hardness'],['Espesores','thickness'],['Precio (€)','price']]
    : [['Marca','brand'],['Categoría','cat'],['Capas','plies'],['Material','material'],['Velocidad','speed'],['Control','control'],['Peso (g)','weight'],['Grosor (mm)','thickness'],['Precio (€)','price']];

  const numKeys = isRubbers ? ['speed','spin','control'] : ['speed','control'];
  const maxVals = {};
  numKeys.forEach(k => { maxVals[k] = Math.max(...items.map(x => x[k]||0)); });

  let html = `<table class="compare-table"><thead><tr><th>Parámetro</th>${items.map(i=>`<th class="prod-name-col">${i.brand}<br>${i.name}</th>`).join('')}</tr></thead><tbody>`;
  keys.forEach(([label, key]) => {
    html += `<tr><td>${label}</td>`;
    items.forEach(item => {
      const val = Array.isArray(item[key]) ? item[key].join(', ') : (item[key] ?? '—');
      const isNum = numKeys.includes(key);
      const isBest = isNum && item[key] === maxVals[key];
      const barPct = isNum ? Math.round((item[key]/100)*120) : 0;
      html += `<td class="${isBest?'best-val':''}">`;
      if (key === 'hardness' && isRubbers) {
        const esnVal = toESN(item.hardness, item.hardScale);
        html += `${item.hardness}${item.hardScale}<br><span style="font-size:0.75rem;color:#c084fc">≈ ${esnVal}°ESN</span>`;
      } else if (isNum) html += `<div class="compare-bar-cell"><div class="bar" style="width:${barPct}px;min-width:4px"></div> ${val}</div>`;
      else html += val;
      html += '</td>';
    });
    html += '</tr>';
  });
  // User ratings row
  html += `<tr><td>Mi puntuación</td>${items.map(i=>`<td>${renderStars(userRatings[i.id]||0)}</td>`).join('')}</tr>`;
  html += `<tr><td>Mis notas</td>${items.map(i=>`<td style="font-size:0.8rem;color:var(--text-dim);font-style:italic">${userNotes[i.id]||'—'}</td>`).join('')}</tr>`;
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id) {
  const allItems = [...RUBBERS, ...BLADES];
  const item = allItems.find(x => x.id === id);
  if (!item) return;
  const isRubber = !!item.spin;
  const rating = userRatings[id] || 0;
  const note = userNotes[id] || '';
  tempRating = rating;

  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <div class="modal-header">
      <div class="modal-title-area">
        <div class="modal-brand">${item.brand}</div>
        <h2>${item.name}</h2>
        <div class="card-tags" style="margin-top:8px">
          ${isRubber ? `<span class="tag ${typeTag(item.type)}">${item.type}</span><span class="tag tag-cat">${item.cat}</span>` : `<span class="tag tag-off">${item.cat}</span><span class="tag tag-mat">${item.material}</span>`}
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="stat-bars-big">
      <div class="stat-row-big"><span class="stat-label-big">Velocidad</span><div class="stat-bar-bg-big"><div class="stat-bar-fill-big fill-speed" style="width:${item.speed}%"></div></div><span class="stat-num-big">${item.speed}/100</span></div>
      ${isRubber ? `<div class="stat-row-big"><span class="stat-label-big">Spin</span><div class="stat-bar-bg-big"><div class="stat-bar-fill-big fill-spin" style="width:${item.spin}%"></div></div><span class="stat-num-big">${item.spin}/100</span></div>` : ''}
      <div class="stat-row-big"><span class="stat-label-big">Control</span><div class="stat-bar-bg-big"><div class="stat-bar-fill-big fill-control" style="width:${item.control}%"></div></div><span class="stat-num-big">${item.control}/100</span></div>
      ${isRubber ? `<div class="stat-row-big"><span class="stat-label-big" style="color:#c084fc">Dureza</span><div class="stat-bar-bg-big" title="Escala normalizada 38–62°ESN"><div class="stat-bar-fill-big" style="width:${hardnessPct(item)}%;background:linear-gradient(90deg,#818cf8,#c084fc)"></div></div><span class="stat-num-big" style="color:#c084fc;font-size:0.75rem">${toESN(item.hardness,item.hardScale)}°ESN</span></div>` : ''}
    </div>

    <div class="modal-grid">
      <div class="spec-section">
        <h3>Especificaciones</h3>
        <div class="spec-table">
          ${isRubber ? `
            <div class="spec-row"><span class="spec-key">Dureza</span><span class="spec-val">${hardnessLabel(item)}</span></div>
            <div class="spec-row"><span class="spec-key">Espesores</span><span class="spec-val">${Array.isArray(item.thickness)?item.thickness.join(' / '):item.thickness} mm</span></div>
            <div class="spec-row"><span class="spec-key">Colores</span><span class="spec-val">${item.color}</span></div>
          ` : `
            <div class="spec-row"><span class="spec-key">Capas</span><span class="spec-val">${item.plies}</span></div>
            <div class="spec-row"><span class="spec-key">Nº capas</span><span class="spec-val">${item.layers === 5 ? '5 capas' : item.layers === 7 ? '7 capas' : item.layers}</span></div>
            <div class="spec-row"><span class="spec-key">Material</span><span class="spec-val">${item.material}</span></div>
            ${item.wood ? `<div class="spec-row" style="display:block;padding:8px 10px;background:var(--surface2);border-radius:6px"><span class="spec-key">🌲 Maderas</span><p style="font-size:0.8rem;color:var(--text);margin-top:4px;font-family:monospace">${item.wood}</p></div>` : ''}
            <div class="spec-row"><span class="spec-key">Grosor</span><span class="spec-val">${item.thickness} mm</span></div>
            <div class="spec-row"><span class="spec-key">Peso aprox.</span><span class="spec-val">${item.weight} g</span></div>
          `}
        </div>
      </div>
      <div class="spec-section">
        <h3>Comercial</h3>
        <div class="spec-table">
          <div class="spec-row"><span class="spec-key">Precio aprox.</span><span class="spec-val" style="color:var(--accent3)">~€${item.price}</span></div>
          <div class="spec-row"><span class="spec-key">Categoría</span><span class="spec-val">${isRubber ? item.type : item.cat}</span></div>
          <div class="spec-row"><span class="spec-key">Marca</span><span class="spec-val">${item.brand}</span></div>
          ${item.nivel ? `<div class="spec-row"><span class="spec-key">Nivel recom.</span><span class="spec-val" style="color:${nivelColor(item.nivel)}">${item.nivel}</span></div>` : ''}
          ${item.note ? `<div class="spec-row" style="display:block;padding:8px 10px;background:var(--surface2);border-radius:6px"><span class="spec-key">📋 Info comunidad</span><p style="font-size:0.8rem;color:var(--text);margin-top:4px">${item.note}</p></div>` : ''}
        </div>
      </div>
    </div>

    <div class="rating-section">
      <h3>Mi puntuación</h3>
      <div class="stars-input" id="stars-input">
        ${[1,2,3,4,5].map(i => `<button class="star-btn" onclick="setTempRating(${i},'${id}')" data-v="${i}">${i<=rating?'★':'☆'}</button>`).join('')}
      </div>
      <h3 style="margin-bottom:8px">Mis notas</h3>
      <textarea id="note-input" placeholder="Escribe aquí tus observaciones…">${note}</textarea>
      <div class="modal-save-row">
        <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveUserData('${id}')">Guardar</button>
      </div>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function setTempRating(val, id) {
  tempRating = val;
  const btns = document.querySelectorAll('#stars-input .star-btn');
  btns.forEach(btn => {
    const v = +btn.dataset.v;
    btn.textContent = v <= val ? '★' : '☆';
    btn.style.color = v <= val ? 'var(--star)' : 'var(--text-dim)';
  });
}

function saveUserData(id) {
  userRatings[id] = tempRating;
  userNotes[id] = document.getElementById('note-input').value;
  localStorage.setItem('tt_ratings', JSON.stringify(userRatings));
  localStorage.setItem('tt_notes', JSON.stringify(userNotes));
  closeModal();
  applyFilters();
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id === 'modal') closeModal(); }

// ─── SETUPS ───────────────────────────────────────────────────────────────────
const THICKNESS_OPTS = ['1.5','1.7','1.8','1.9','2.0','2.1','2.2','2.3','Max'];

function saveSetupsToStorage() {
  localStorage.setItem('tt_setups', JSON.stringify(setupsList));
}

function renderSetups() {
  const grid = document.getElementById('setups-grid');
  const empty = document.getElementById('setups-empty');
  if (!setupsList.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = setupsList.map(s => {
    const stars = renderStars(s.rating || 0);
    const dateStr = s.date ? new Date(s.date).toLocaleDateString('es-ES') : '';
    const badgeFH = `<span class="setup-part-badge ${s.fhColor === 'Rojo' ? 'badge-red' : 'badge-black'}">${s.fhColor}</span>`;
    const badgeBH = `<span class="setup-part-badge ${s.bhColor === 'Rojo' ? 'badge-red' : 'badge-black'}">${s.bhColor}</span>`;
    return `
    <div class="setup-card">
      <div class="setup-card-title">${s.blade || '—'}</div>
      <div class="setup-card-date">${dateStr}</div>
      <div class="setup-parts">
        <div class="setup-part">
          <span class="setup-part-label">Derecha</span>
          <span class="setup-part-val">${s.fhRubber || '—'}</span>
          <span style="color:var(--text-dim);font-size:0.78rem">${s.fhThickness}mm</span>
          ${badgeFH}
        </div>
        <div class="setup-part">
          <span class="setup-part-label">Revés</span>
          <span class="setup-part-val">${s.bhRubber || '—'}</span>
          <span style="color:var(--text-dim);font-size:0.78rem">${s.bhThickness}mm</span>
          ${badgeBH}
        </div>
      </div>
      ${s.notes ? `<div class="setup-note-preview">📝 ${s.notes}</div>` : ''}
      <div class="setup-footer">
        <div class="card-rating">${stars}</div>
        <div class="setup-actions">
          <button class="btn btn-outline btn-sm" onclick="openSetupModal('${s.id}')">Editar</button>
          <button class="btn btn-danger btn-sm" onclick="deleteSetup('${s.id}')">Eliminar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openSetupModal(id) {
  editingSetupId = id;
  const s = id ? setupsList.find(x => x.id === id) : null;
  tempSetupRating = s ? (s.rating || 0) : 0;

  const bladeNames = BLADES.map(b => b.name).sort();
  const rubberNames = RUBBERS.map(r => r.name).sort();
  const thicknessOpts = THICKNESS_OPTS.map(t => `<option value="${t}"${(s&&s.fhThickness===t)?'selected':''}>${t}</option>`).join('');
  const thicknessOptsBH = THICKNESS_OPTS.map(t => `<option value="${t}"${(s&&s.bhThickness===t)?'selected':''}>${t}</option>`).join('');

  document.getElementById('setup-modal-content').innerHTML = `
    <div class="modal-header">
      <div class="modal-title-area">
        <h2>${id ? 'Editar setup' : 'Nuevo setup'}</h2>
      </div>
      <button class="modal-close" onclick="closeSetupModal()">✕</button>
    </div>

    <div class="setup-modal-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Madera</label>
        <input type="text" id="setup-blade" list="blade-list" placeholder="Nombre de la madera…" value="${s?s.blade:''}">
        <datalist id="blade-list">${bladeNames.map(n=>`<option value="${n}">`).join('')}</datalist>
      </div>
      <div class="form-group" style="grid-column:1/-1"><hr style="border-color:var(--border);margin:4px 0"></div>

      <div class="form-group">
        <label>Goma Derecha (FH)</label>
        <input type="text" id="setup-fh-rubber" list="rubber-list-fh" placeholder="Nombre de la goma…" value="${s?s.fhRubber:''}">
        <datalist id="rubber-list-fh">${rubberNames.map(n=>`<option value="${n}">`).join('')}</datalist>
      </div>
      <div class="form-group">
        <label>Color</label>
        <select id="setup-fh-color">
          <option value="Rojo" ${s&&s.fhColor==='Rojo'?'selected':''}>Rojo</option>
          <option value="Negro" ${s&&s.fhColor==='Negro'?'selected':''}>Negro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Grosor FH</label>
        <select id="setup-fh-thickness">${thicknessOpts}</select>
      </div>

      <div class="form-group" style="grid-column:1/-1"><hr style="border-color:var(--border);margin:4px 0"></div>

      <div class="form-group">
        <label>Goma Revés (BH)</label>
        <input type="text" id="setup-bh-rubber" list="rubber-list-bh" placeholder="Nombre de la goma…" value="${s?s.bhRubber:''}">
        <datalist id="rubber-list-bh">${rubberNames.map(n=>`<option value="${n}">`).join('')}</datalist>
      </div>
      <div class="form-group">
        <label>Color</label>
        <select id="setup-bh-color">
          <option value="Rojo" ${s&&s.bhColor==='Rojo'?'selected':''}>Rojo</option>
          <option value="Negro" ${s&&s.bhColor==='Negro'?'selected':''}>Negro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Grosor BH</label>
        <select id="setup-bh-thickness">${thicknessOptsBH}</select>
      </div>
    </div>

    <div class="rating-section">
      <h3>Puntuación del setup</h3>
      <div class="stars-input" id="setup-stars-input">
        ${[1,2,3,4,5].map(i => `<button class="star-btn" onclick="setTempSetupRating(${i})" data-v="${i}" style="color:${i<=tempSetupRating?'var(--star)':'var(--text-dim)'}">${i<=tempSetupRating?'★':'☆'}</button>`).join('')}
      </div>
      <h3 style="margin-bottom:8px">Notas</h3>
      <textarea id="setup-notes" placeholder="Sensaciones, contexto, torneos donde lo usaste…" style="height:90px">${s?s.notes:''}</textarea>
    </div>
    <div class="modal-save-row">
      <button class="btn btn-outline" onclick="closeSetupModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSetup()">Guardar setup</button>
    </div>
  `;
  document.getElementById('setup-modal').classList.add('open');
}

function setTempSetupRating(val) {
  tempSetupRating = val;
  document.querySelectorAll('#setup-stars-input .star-btn').forEach(btn => {
    const v = +btn.dataset.v;
    btn.textContent = v <= val ? '★' : '☆';
    btn.style.color = v <= val ? 'var(--star)' : 'var(--text-dim)';
  });
}

function saveSetup() {
  const setup = {
    id: editingSetupId || ('s' + Date.now()),
    blade: document.getElementById('setup-blade').value.trim(),
    fhRubber: document.getElementById('setup-fh-rubber').value.trim(),
    fhThickness: document.getElementById('setup-fh-thickness').value,
    fhColor: document.getElementById('setup-fh-color').value,
    bhRubber: document.getElementById('setup-bh-rubber').value.trim(),
    bhThickness: document.getElementById('setup-bh-thickness').value,
    bhColor: document.getElementById('setup-bh-color').value,
    rating: tempSetupRating,
    notes: document.getElementById('setup-notes').value.trim(),
    date: editingSetupId ? (setupsList.find(x=>x.id===editingSetupId)||{}).date || new Date().toISOString() : new Date().toISOString()
  };
  if (editingSetupId) {
    const idx = setupsList.findIndex(x => x.id === editingSetupId);
    if (idx !== -1) setupsList[idx] = setup;
  } else {
    setupsList.unshift(setup);
  }
  saveSetupsToStorage();
  closeSetupModal();
  renderSetups();
}

function deleteSetup(id) {
  if (!confirm('¿Eliminar este setup?')) return;
  setupsList = setupsList.filter(x => x.id !== id);
  saveSetupsToStorage();
  renderSetups();
}

function closeSetupModal() { document.getElementById('setup-modal').classList.remove('open'); }
function closeSetupModalOutside(e) { if (e.target.id === 'setup-modal') closeSetupModal(); }

// ─── START ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
